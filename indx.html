<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; line-height: 1.8; }
        .app-container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .dropdown { padding: 5px; border: 2px solid #e67e22; border-radius: 4px; font-weight: bold; }
        .btn-check { margin-top: 20px; padding: 12px 25px; background: #d35400; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Hospitality Migration: Australian Floor Management</h2>
    <div id="para-container"></div>
    <button class="btn-check" onclick="checkAll()">Analyze Migration Narrative</button>
    <div id="result" style="margin-top: 20px; font-weight: bold;"></div>
</div>

<script>
const narratives = [
    {
        title: "1. Floor Management & Operational Value",
        text: "As an experienced Floor Manager transitioning to the Australian hospitality industry, I bring a focus on rigorous quality standards. [1] I navigate the transition between maritime and luxury apartment operations, I adapt my management style to ensure seamless service delivery. [2] I oversee housekeeping teams, I integrate WHS (Workplace Health and Safety) protocols as the foundation of our daily performance. [3] the differences in regulatory environments, I am committed to achieving full compliance with Australian hospitality standards. [4] my extensive background in high-volume environments, I bring a unique efficiency to luxury property management. [5] I aim to enhance guest satisfaction through meticulous attention to detail.",
        options: [["Insofar as", "Finally"], ["Whereby", "Because"], ["Notwithstanding", "However"], ["By virtue of", "Therefore"], ["Concurrently", "Additionally"]],
        ans: [0, 0, 0, 0, 1]
    },
    {
        title: "2. Guest Experience & Quality Maintenance",
        text: "Delivering an exceptional guest experience is my primary professional KPI. [1] I manage housekeeping operations, I ensure that every apartment presentation reflects a premium brand identity. [2] I streamline room turnover processes, I minimize downtime while maximizing the quality of the finish. [3] the logistical hurdles of high-end property maintenance, I never compromise on the standards of cleanliness. [4] this uncompromising dedication to quality, I drive positive reviews and repeat patronage. [5] I constantly innovate on the floor to elevate the overall guest satisfaction score.",
        options: [["Insofar as", "While"], ["Whereby", "Similarly"], ["Notwithstanding", "Insofar as"], ["By virtue of", "Additionally"], ["Concurrently", "Finally"]],
        ans: [1, 0, 0, 0, 1]
    },
    {
        title: "3. Professional Integration & Visa Contribution",
        text: "I view my potential sponsorship not merely as a career step, but as a strategic contribution to the Australian tourism sector. [1] I integrate into the local industry, I bring global best practices derived from my tenure at Carnival Cruise Lines. [2] I mentor local staff, I foster a culture of professionalism and operational excellence. [3] the complexities of visa and migration requirements, I remain steadfast in my commitment to building a long-term career in Australia. [4] my diverse international experience, I offer a unique perspective on service scalability. [5] I am fully prepared to make a positive impact on Australian property management standards.",
        options: [["Insofar as", "Finally"], ["Whereby", "Additionally"], ["Notwithstanding", "However"], ["By virtue of", "Concurrently"], ["Concurrently", "Finally"]],
        ans: [0, 0, 0, 0, 1]
    }
];

function render() {
    let html = "";
    narratives.forEach((n, i) => {
        html += `<h3>${n.title}</h3><p>${n.text.replace(/\[\d\]/g, (match) => {
            let idx = parseInt(match[1]) - 1;
            let opts = n.options[idx].map((o, optIdx) => `<option value="${optIdx}">${o}</option>`).join('');
            return `<select id="s${i}_${idx}" class="dropdown"><option>Select...</option>${opts}</select>`;
        })}</p>`;
    });
    document.getElementById('para-container').innerHTML = html;
}

function checkAll() {
    let total = 0;
    narratives.forEach((n, i) => {
        n.options.forEach((_, idx) => {
            if(document.getElementById(`s${i}_${idx}`).value == n.ans[idx]) total++;
        });
    });
    document.getElementById('result').innerText = `Your Score: ${total}/15. ${total === 15 ? "Australian Hospitality Narrative Mastered." : "Review your logical connectors—hospitality management requires showing how your high-volume cruise experience translates to high-end Australian quality."}`;
}
render();
</script>
</body>
</html>
